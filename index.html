    function mascaraCPFDeposito(i) {
        var v = i.value.replace(/\D/g, "");
        i.setAttribute("maxlength", "14");
        if (v.length <= 11) {
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }
    }



    function limparCampoPiscando() {
        document.querySelectorAll('.campo-piscando').forEach(el => el.classList.remove('campo-piscando'));
    }

    function avisarCampoObrigatorio(id, mensagem) {
        limparCampoPiscando();

        if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "center" });
            setTimeout(() => {
                el.focus();
                el.classList.add('campo-piscando');
            }, 350);
        }
        return false;
    }

    function limparPiscandoAoDigitar() {
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('input', () => el.classList.remove('campo-piscando'));
            el.addEventListener('change', () => el.classList.remove('campo-piscando'));
        });
    }

    function validarCPFDeposito(cpf) {
        cpf = (cpf || '').replace(/[^\d]+/g, '');
        if (cpf === '') return false;
        if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
        let soma = 0, resto;
        for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i), 10) * (11 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10), 10)) return false;
        soma = 0;
        for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i), 10) * (12 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(10, 11), 10)) return false;
        return true;
    }

    function mascaraCPFDeposito(i) {
        let v = (i.value || '').replace(/\D/g, '').slice(0, 11);
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        i.value = v;
    }

    function validarCNPJDeposito(cnpj) {
        cnpj = (cnpj || '').replace(/[^\d]+/g, '');
        if (cnpj === '') return false;
        if (cnpj.length !== 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
        let tamanho = cnpj.length - 2;
        let numeros = cnpj.substring(0, tamanho);
        let digitos = cnpj.substring(tamanho);
        let soma = 0;
        let pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
        if (resultado != digitos.charAt(0)) return false;
        tamanho = tamanho + 1;
        numeros = cnpj.substring(0, tamanho);
        soma = 0;
        pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
        if (resultado != digitos.charAt(1)) return false;
        return true;
    }

    function mascaraCNPJDeposito(i) {
        let v = (i.value || '').replace(/\D/g, '').slice(0, 14);
        v = v.replace(/^(\d{2})(\d)/, "$1.$2");
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
        v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
        v = v.replace(/(\d{4})(\d)/, "$1-$2");
        i.value = v;
    }

    function mascaraCelularPix(i) {
        let v = (i.value || '').replace(/\D/g, '').slice(0, 11);
        if (v.length <= 2) { i.value = v ? "(" + v : ""; return; }
        if (v.length <= 6) { i.value = "(" + v.slice(0, 2) + ") " + v.slice(2); return; }
        if (v.length <= 10) { i.value = "(" + v.slice(0, 2) + ") " + v.slice(2, 6) + "-" + v.slice(6); return; }
        i.value = "(" + v.slice(0, 2) + ") " + v.slice(2, 7) + "-" + v.slice(7);
    }

    function validarCelularPix(celular) {
        const n = (celular || '').replace(/\D/g, '');
        return n.length === 10 || n.length === 11;
    }

    function validarEmailPix(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((email || '').trim());
    }

    function formatarChavePix() {
        const tipo = document.getElementById('tipo-chave-pix') ? document.getElementById('tipo-chave-pix').value : '';
        const chave = document.getElementById('chave-pix-deposito');
        if (!chave) return;
        if (tipo === 'CPF') mascaraCPFDeposito(chave);
        else if (tipo === 'CNPJ') mascaraCNPJDeposito(chave);
        else if (tipo === 'CELULAR') mascaraCelularPix(chave);
        validarChavePixVisual();
    }

    function ajustarCampoChavePix() {
        const tipo = document.getElementById('tipo-chave-pix') ? document.getElementById('tipo-chave-pix').value : '';
        const chave = document.getElementById('chave-pix-deposito');
        if (!chave) return;
        chave.value = '';
        chave.classList.remove('campo-piscando');
        if (tipo === 'CPF') { chave.placeholder = 'Digite a chave CPF: 000.000.000-00'; chave.maxLength = 14; }
        else if (tipo === 'CNPJ') { chave.placeholder = 'Digite a chave CNPJ: 00.000.000/0000-00'; chave.maxLength = 18; }
        else if (tipo === 'CELULAR') { chave.placeholder = 'Digite a chave celular: (00) 00000-0000'; chave.maxLength = 15; }
        else if (tipo === 'E-MAIL') { chave.placeholder = 'Digite a chave e-mail'; chave.maxLength = 80; }
        else if (tipo === 'CHAVE ALEATÓRIA') { chave.placeholder = 'Digite a chave aleatória'; chave.maxLength = 100; }
        else { chave.placeholder = 'Digite a chave PIX conforme o tipo selecionado'; chave.maxLength = 100; }
        validarChavePixVisual();
    }

    function validarChavePix() {
        const tipo = document.getElementById('tipo-chave-pix') ? document.getElementById('tipo-chave-pix').value : '';
        const chave = document.getElementById('chave-pix-deposito') ? document.getElementById('chave-pix-deposito').value.trim() : '';
        if (!tipo || !chave) return false;
        if (tipo === 'CPF') return validarCPFDeposito(chave);
        if (tipo === 'CNPJ') return validarCNPJDeposito(chave);
        if (tipo === 'CELULAR') return validarCelularPix(chave);
        if (tipo === 'E-MAIL') return validarEmailPix(chave);
        if (tipo === 'CHAVE ALEATÓRIA') return chave.length >= 20;
        return chave.length > 0;
    }

    function validarChavePixVisual() {
        const erro = document.getElementById('erro-chave-pix');
        const chave = document.getElementById('chave-pix-deposito');
        const tipo = document.getElementById('tipo-chave-pix') ? document.getElementById('tipo-chave-pix').value : '';
        if (!erro || !chave) return true;
        if (!chave.value.trim()) { erro.style.display = 'none'; return true; }
        if (tipo && !validarChavePix()) { erro.style.display = 'block'; return false; }
        erro.style.display = 'none';
        return true;
    }

    function verificarCPFDeposito() {
        const input = document.getElementById('cpf-deposito');
        const erro = document.getElementById('erro-cpf-deposito');
        if (!input || !erro) return true;
        const somenteNumeros = input.value.replace(/\D/g, '');
        if (somenteNumeros.length === 0) { erro.style.display = 'none'; input.style.border = ''; return true; }
        if (somenteNumeros.length >= 11 && !validarCPFDeposito(input.value)) {
            erro.style.display = 'block';
            input.style.border = '2px solid #dc3545';
            return false;
        }
        erro.style.display = 'none';
        input.style.border = '';
        return true;
    }

    function validarDadosDeposito() {
        const tipo = document.getElementById('tipo-chave-pix') ? document.getElementById('tipo-chave-pix').value : '';
        const chave = document.getElementById('chave-pix-deposito') ? document.getElementById('chave-pix-deposito').value.trim() : '';
        const banco = document.getElementById('banco-deposito') ? document.getElementById('banco-deposito').value : '';
        const cpf = document.getElementById('cpf-deposito') ? document.getElementById('cpf-deposito').value : '';
        if (!tipo) return avisarCampoObrigatorio('tipo-chave-pix', '⚠️ Atenção: selecione o Tipo da Chave PIX.');
        if (!chave) return avisarCampoObrigatorio('chave-pix-deposito', '⚠️ Atenção: digite a Chave PIX.');
        if (!validarChavePix()) {
            const msg = tipo === 'CPF' ? '❌ A Chave PIX do tipo CPF está inválida.'
                      : tipo === 'CNPJ' ? '❌ A Chave PIX do tipo CNPJ está inválida.'
                      : tipo === 'CELULAR' ? '❌ A Chave PIX do tipo celular está inválida. Informe com DDD.'
                      : tipo === 'E-MAIL' ? '❌ A Chave PIX do tipo e-mail está inválida.'
                      : '❌ A Chave PIX informada está inválida.';
            return avisarCampoObrigatorio('chave-pix-deposito', msg);
        }
        if (!banco) return avisarCampoObrigatorio('banco-deposito', '⚠️ Atenção: selecione o Banco dos dados para depósito.');
        if (!cpf) return avisarCampoObrigatorio('cpf-deposito', '⚠️ Atenção: o CPF dos dados para depósito é obrigatório.');
        if (!validarCPFDeposito(cpf)) {
            verificarCPFDeposito();
            return avisarCampoObrigatorio('cpf-deposito', '❌ CPF dos dados para depósito inválido! Confira o número informado.');
        }
        return true;
    }

    function nomeArquivoRelatorioCaixinha() {
        const num = (document.getElementById('num-caixinha').value || 'SEM-NUMERO').replace(/[^\w\-]+/g, '-');
        const data = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
        return `relatorio-caixinha-${num}-${data}.pdf`;
    }

    function carregarScriptHtml2Pdf() {
        return new Promise((resolve, reject) => {
            if (window.html2pdf) return resolve();

            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    async function gerarArquivoPDFCaixinha() {
        abrirPlanilha();
        await new Promise(resolve => setTimeout(resolve, 600));

        await carregarScriptHtml2Pdf();

        const elemento = document.getElementById('tela-planilha');
        const opt = {
            margin: 0.2,
            filename: nomeArquivoRelatorioCaixinha(),
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };

        const blob = await html2pdf().set(opt).from(elemento).outputPdf('blob');
        return new File([blob], nomeArquivoRelatorioCaixinha(), { type: 'application/pdf' });
    }

    async function compartilharWhatsApp() {
        if (!banco.length) {
            alert('⚠️ Não há lançamentos para compartilhar.');
            return;
        }

        try {
            const arquivo = await gerarArquivoPDFCaixinha();

            if (navigator.canShare && navigator.canShare({ files: [arquivo] })) {
                await navigator.share({
                    title: 'Relatório de Caixinha',
                    text: 'Relatório de Caixinha - Controladoria',
                    files: [arquivo]
                });
                return;
            }

            const urlArquivo = URL.createObjectURL(arquivo);
            const link = document.createElement('a');
            link.href = urlArquivo;
            link.download = arquivo.name;
            document.body.appendChild(link);
            link.click();
            link.remove();

            alert('✅ PDF gerado. Agora compartilhe o arquivo pelo WhatsApp.');
        } catch (e) {
            console.error(e);
            alert('⚠️ Não foi possível compartilhar automaticamente. Vou abrir a tela de impressão para salvar o PDF.');
            abrirPlanilha();
            setTimeout(() => window.print(), 800);
        }
    }

    async function gerarHash(texto) {
        const encoder = new TextEncoder();
        const data = encoder.encode(texto);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
    }

    function calcularSaldo() {
        let inputAnterior = document.getElementById('saldo-anterior');
        let ant = parseFloat(inputAnterior.value) || 0;

        if (ant >= 0) {
            inputAnterior.className = "positivo";
        } else {
            inputAnterior.className = "negativo";
        }

        let cred = banco.filter(i => i.categoria.includes('CRÉDITO')).reduce((s, i) => s + i.valor, 0);
        let deb = banco.filter(i => !i.categoria.includes('CRÉDITO')).reduce((s, i) => s + i.valor, 0);
        let total = ant + cred - deb;

        document.getElementById('total-creditos').innerText = cred.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('total-gasto').innerText = deb.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        let display = document.getElementById('saldo-atual-display');
        display.innerText = "SALDO ATUAL: " + total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        display.className = total >= 0 ? "saldo-atual positivo" : "saldo-atual negativo";
    }

    function comprimirImagem(file) {
        return new Promise((resolve) => {
            if (!file) { resolve(null); return; }
            let reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                let img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let ctx = canvas.getContext('2d');
                    let MAX_WIDTH = 600;
                    let MAX_HEIGHT = 600;
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                }
            }
        });
    }

    async function salvarDespesa() {
        let numCaixinha = document.getElementById('num-caixinha').value;
        let gestor = document.getElementById('nome-gestor').value;
        let saldoAnterior = document.getElementById('saldo-anterior').value;

        if(!numCaixinha) return focarErro('num-caixinha', "⚠️ Atenção: Preencha o Nº do Caixinha!");
        if(!gestor) return focarErro('nome-gestor', "⚠️ Atenção: Preencha o Nome do Gestor!");
        if(saldoAnterior === "") return focarErro('saldo-anterior', "⚠️ Atenção: Preencha o Saldo Anterior!");

        if (!validarDadosDeposito()) return;

        let categoria = document.getElementById('categoria').value;
        if(!categoria) return focarErro('categoria', "⚠️ Atenção: Selecione a Categoria!");

        let dataStr = document.getElementById('data').value;
        if(!dataStr) return focarErro('data', "⚠️ Atenção: Preencha a Data!");

        let fornecedor = document.getElementById('fornecedor').value;
        if(!fornecedor) return focarErro('fornecedor', "⚠️ Atenção: Preencha o Fornecedor!");

        let desc = document.getElementById('desc').value;
        if(!desc) return focarErro('desc', "⚠️ Atenção: Preencha a Descrição do Gasto/Crédito!");

        let valorInput = document.getElementById('valor').value;
        if(!valorInput) return focarErro('valor', "⚠️ Atenção: Preencha o Valor!");

        let tipoDoc = document.getElementById('tipo-doc').value;
        if(!tipoDoc) return focarErro('tipo-doc', "⚠️ Atenção: Selecione o Tipo de Documento Fiscal!");

        let fotoDocFile = document.getElementById('foto-doc').files[0];
        if (indiceEdicao === -1 && !fotoDocFile) return focarErro('foto-doc', "⚠️ Atenção: É obrigatório anexar a Foto da Nota Fiscal!");

        let formaPagto = document.getElementById('forma-pagto').value;
        if(!formaPagto) return focarErro('forma-pagto', "⚠️ Atenção: Selecione a Forma de Pagamento!");

        let fotoPagtoFile = document.getElementById('foto-pagto').files[0];
        if (indiceEdicao === -1 && !fotoPagtoFile) return focarErro('foto-pagto', "⚠️ Atenção: É obrigatório anexar a Foto do Pagamento!");

        let valor = parseFloat(valorInput);

        document.getElementById('btn-salvar-principal').innerText = "⏳ Processando...";
        let fDoc = await comprimirImagem(fotoDocFile);
        let fPag = await comprimirImagem(fotoPagtoFile);

        let obsDoc = document.getElementById('obs-doc').value;
        let obsPagto = document.getElementById('obs-pagto').value;

        let item = {
            categoria: categoria,
            data: dataStr.split('-').reverse().join('/'),
            fornecedor: fornecedor,
            descricao: desc,
            valor: valor,
            tipoDoc: tipoDoc,
            formaPagto: formaPagto,
            fotoDoc: fDoc,
            fotoPagto: fPag,
            obsDoc: obsDoc,      
            obsPagto: obsPagto  
        };

        if (indiceEdicao >= 0) {
            if (!item.fotoDoc) item.fotoDoc = banco[indiceEdicao].fotoDoc;
            if (!item.fotoPagto) item.fotoPagto = banco[indiceEdicao].fotoPagto;
            banco[indiceEdicao] = item;
            indiceEdicao = -1; 
            document.getElementById('btn-salvar-principal').innerText = "➕ Salvar na Lista";
        } else {
            banco.push(item);
        }

        try {
            salvarBancoCaixinha();
            document.getElementById('categoria').selectedIndex = 0;
            document.getElementById('desc').value = ''; 
            document.getElementById('valor').value = ''; 
            document.getElementById('fornecedor').value = '';
            document.getElementById('foto-doc').value = ''; 
            document.getElementById('foto-pagto').value = '';
            document.getElementById('obs-doc').value = '';     
            document.getElementById('obs-pagto').value = '';   
            document.getElementById('tipo-doc').selectedIndex = 0;
            document.getElementById('forma-pagto').selectedIndex = 0;
            document.getElementById('btn-salvar-principal').innerText = "➕ Salvar na Lista";
            calcularSaldo(); 
            alert("✔️ Lançamento Salvo!");
        } catch (e) {
            alert("❌ Memória cheia! Exclua itens antigos ou encerre o caixinha.");
            document.getElementById('btn-salvar-principal').innerText = "➕ Salvar na Lista";
        }
    }

    function abrirPlanilha() {
        document.getElementById('tela-principal').style.display = 'none';
        document.getElementById('tela-planilha').style.display = 'block';

        document.getElementById('print-num').innerText = document.getElementById('num-caixinha').value || "Não informado";
        document.getElementById('print-gestor').innerText = document.getElementById('nome-gestor').value || "Não informado";
        document.getElementById('print-tipo-chave-pix').innerText = document.getElementById('tipo-chave-pix').value || "Não informado";
        document.getElementById('print-chave-pix-deposito').innerText = document.getElementById('chave-pix-deposito').value || "Não informado";
        document.getElementById('print-banco-deposito').innerText = document.getElementById('banco-deposito').value || "Não informado";
        document.getElementById('print-cpf-deposito').innerText = document.getElementById('cpf-deposito').value || "Não informado";

        let ant = parseFloat(document.getElementById('saldo-anterior').value) || 0;
        let printAnterior = document.getElementById('print-anterior');
        printAnterior.innerText = ant.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        printAnterior.className = ant >= 0 ? "positivo" : "negativo";

        document.getElementById('print-creditos').innerText = document.getElementById('total-creditos').innerText;
        document.getElementById('print-debitos').innerText = document.getElementById('total-gasto').innerText;

        let displayAtual = document.getElementById('saldo-atual-display');
        let printFinal = document.getElementById('print-final');
        printFinal.innerText = displayAtual.innerText.replace("SALDO ATUAL: ","");
        printFinal.className = displayAtual.className.includes('positivo') ? "positivo" : "negativo";

        document.getElementById('print-data-emissao').innerText = "Emitido em: " + new Date().toLocaleDateString() + " às " + new Date().toLocaleTimeString();

        let corpo = document.getElementById('corpo-tabela'); 
        corpo.innerHTML = "";
        banco.forEach((item, index) => {
            let fHTML = `<div style="display:flex; flex-direction:row; gap:10px; justify-content:center; align-items:flex-start;">`;
            if(item.fotoDoc) fHTML += `<div class="anexo-box"><span class="legenda-foto">${item.tipoDoc}</span><img src="${item.fotoDoc}" class="foto-miniatura" onclick="verFoto('${item.fotoDoc}')"></div>`;
            if(item.fotoPagto) fHTML += `<div class="anexo-box"><span class="legenda-foto">${item.formaPagto}</span><img src="${item.fotoPagto}" class="foto-miniatura" onclick="verFoto('${item.fotoPagto}')"></div>`;
            fHTML += `</div>`;

            corpo.innerHTML += `<tr>
                <td>${item.categoria}</td>
                <td>${item.data}</td>
                <td>${item.fornecedor}</td>
                <td>${item.descricao}</td>
                <td style="white-space:nowrap; font-weight:bold;">R$ ${item.valor.toFixed(2)}</td>
                <td>${fHTML || '---'}</td>
                <td style="text-align:center;">
                    <button onclick="editar(${index})" style="background:orange; color:white; border:none; padding:8px; border-radius:3px; cursor:pointer; margin-bottom:5px; width: 100%;">✏️ Editar</button>
                    <button onclick="excluir(${index})" style="background:red; color:white; border:none; padding:8px; border-radius:3px; cursor:pointer; width: 100%;">🗑️ Excluir</button>
                </td>
            </tr>`;
        });
    }

    function voltarParaFormulario() { document.getElementById('tela-planilha').style.display = 'none'; document.getElementById('tela-principal').style.display = 'block'; }
    function verFoto(src) { document.getElementById('foto-ampliada').src = src; document.getElementById('modal-foto').style.display = 'flex'; }

    function editar(index) {
        let it = banco[index];
        document.getElementById('categoria').value = it.categoria;
        document.getElementById('data').value = it.data.split('/').reverse().join('-');
        document.getElementById('fornecedor').value = it.fornecedor;
        document.getElementById('desc').value = it.descricao;
        document.getElementById('valor').value = it.valor;
        document.getElementById('tipo-doc').value = it.tipoDoc;
        document.getElementById('forma-pagto').value = it.formaPagto;
        document.getElementById('obs-doc').value = it.obsDoc || "";       
        document.getElementById('obs-pagto').value = it.obsPagto || "";   
        indiceEdicao = index;
        document.getElementById('btn-salvar-principal').innerText = "💾 Atualizar Lançamento";
        voltarParaFormulario();
    }

    function excluir(index) { if(confirm("Excluir definitivamente?")) { banco.splice(index,1); salvarBancoCaixinha(); abrirPlanilha(); calcularSaldo(); } }
    function gerarPDF() { compartilharWhatsApp(); }

    function encerrarCaixinha() { 
        if(confirm("Zerar tudo? Você perderá todos os dados não enviados!")) { 

            localStorage.removeItem('wm_despesas'); 
            localStorage.removeItem('wm_sessao_ativa'); 
            localStorage.removeItem('wm_num');
            localStorage.removeItem('wm_gestor');
            localStorage.removeItem('wm_anterior');
            localStorage.removeItem('wm_tipo_chave_pix');
            localStorage.removeItem('wm_chave_pix_deposito');
            localStorage.removeItem('wm_banco_deposito');
            localStorage.removeItem('wm_cpf_deposito');

            banco = [];
            indiceEdicao = -1;
            document.getElementById('corpo-tabela').innerHTML = "";

            document.getElementById('num-caixinha').value = '';
            document.getElementById('nome-gestor').value = '';
            document.getElementById('saldo-anterior').value = '';
            document.getElementById('tipo-chave-pix').value = '';
            document.getElementById('chave-pix-deposito').value = '';
            document.getElementById('banco-deposito').value = '';
            document.getElementById('cpf-deposito').value = '';
            document.getElementById('categoria').selectedIndex = 0;
            document.getElementById('desc').value = ''; 
            document.getElementById('valor').value = ''; 
            document.getElementById('fornecedor').value = '';
            document.getElementById('foto-doc').value = ''; 
            document.getElementById('foto-pagto').value = '';
            document.getElementById('obs-doc').value = ''; 
            document.getElementById('obs-pagto').value = ''; 
            document.getElementById('tipo-doc').selectedIndex = 0;
            document.getElementById('forma-pagto').selectedIndex = 0;

            calcularSaldo();

            document.getElementById('tela-principal').style.display = 'none';
            document.getElementById('tela-planilha').style.display = 'none';
            document.getElementById('tela-login').style.display = 'flex';
            destravarLoginCelular();
            toggleBodyScroll(true); 

            document.getElementById('senha-input').value = '';
            document.getElementById('erro-login').style.display = 'none';

            alert("✅ Caixinha encerrado, dados e sessão apagados com sucesso!");
        } 
    }

    async function atualizarAppSeguro() {
        if(confirm("Deseja buscar a versão mais recente do aplicativo? (Seus dados salvos NÃO serão perdidos)")) {
            if ('caches' in window) {
                try {
                    const nomesCaches = await caches.keys();
                    await Promise.all(nomesCaches.map(nome => {
                        if (nome.startsWith('caixinha-wm-')) return caches.delete(nome);
                    }));
                } catch (e) {
                    console.error("Erro ao limpar o cache isolado:", e);
                }
            }
            window.location.href = window.location.pathname + '?atualizar=' + new Date().getTime();
        }
    }

    document.getElementById('num-caixinha').value = localStorage.getItem('wm_num') || '';
    document.getElementById('nome-gestor').value = localStorage.getItem('wm_gestor') || '';
    document.getElementById('saldo-anterior').value = localStorage.getItem('wm_anterior') || '';
    document.getElementById('tipo-chave-pix').value = localStorage.getItem('wm_tipo_chave_pix') || '';
    document.getElementById('chave-pix-deposito').value = localStorage.getItem('wm_chave_pix_deposito') || '';
    document.getElementById('banco-deposito').value = localStorage.getItem('wm_banco_deposito') || '';
    document.getElementById('cpf-deposito').value = localStorage.getItem('wm_cpf_deposito') || '';
    ajustarCampoChavePix();
    verificarCPFDeposito();
    calcularSaldo();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.update();
            reg.onupdatefound = () => {
                const novoWorker = reg.installing;
                novoWorker.onstatechange = () => {
                    if (novoWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        console.log("Nova versão detectada! Atualizando app silenciosamente...");
                        window.location.reload(true);
                    }
                };
            };
        }).catch(err => {
            console.log("Erro no Service Worker:", err);
        });

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                document.body.offsetHeight; 
                if (navigator.serviceWorker) {
                    navigator.serviceWorker.ready.then(reg => reg.update());
                }
            }
        });
    }
</script>
